<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Receta - La Receta del Opa</title>
    <link rel="stylesheet" href="css/styles_publicar_receta.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <nav class="main-nav">
            <div class="logo">
                <img src="logo_olla.png" alt="La Receta del Opa Logo Icon">
                <h1>La receta del Opa</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Recetas del opa</a></li>
                <li><a href="#">Recetas de la comunidad</a></li>
            </ul>
            <div class="header-actions"> <!--{/* Cambiado de auth-buttons a header-actions */}-->
                <a href="publicar-receta.html" class="btn btn-primary-action active">Publicar Receta</a>
            </div>
        </nav>
    </header>

    <main class="form-page-section">
        <h2 class="page-title">Publicar receta</h2>
        <div class="form-container">
            <form>
                <div class="form-group">
                    <label for="recipe-title">Título</label>
                    <input type="text" id="recipe-title" name="recipe-title" placeholder="Ingresa el Título de la Receta">
                </div>

                <div class="form-group">
                    <label for="recipe-attach-image">Adjuntar</label>
                    <div class="file-upload-area">
                        <input type="file" id="recipe-attach-image" name="recipe-attach-image" class="file-input-hidden" accept="image/*">
                        <label for="recipe-attach-image" class="file-upload-label">
                            <span class="plus-icon">+</span>
                            <!--{/* Puedes añadir texto como "Subir imagen" si lo deseas */}-->
                        </label>
                        <!--{/* Aquí podrías mostrar un preview de la imagen o el nombre del archivo con JS */}-->
                    </div>
                </div>

                <div class="form-group">
                    <label for="recipe-description">Descripción</label>
                    <textarea id="recipe-description" name="recipe-description" rows="6" placeholder="Detalla tu receta"></textarea>
                </div>

                <button type="submit" class="btn-submit">Publicar</button>
            </form>
        </div>
    </main>

</body>
</html>
